# =============================================
# 个人开发者门户 Nginx 配置
# 架构说明：
#   - portal.example.com       → 门户前端（Vue构建）+ 后端API
#   - task.example.com         → 子系统：任务管理
#   - chart.example.com        → 子系统：数据可视化
#   - 各子系统独立部署，门户统一入口
# =============================================

# 全局配置
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    # 性能优化
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # ============================================
    # 门户主站配置
    # ============================================
    server {
        listen 80;
        server_name portal.example.com;  # 修改为你的域名

        # HTTPS重定向（配置SSL证书后取消注释）
        # return 301 https://$host$request_uri;

        # 前端静态文件
        root /var/www/portal/dist;
        index index.html;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # API 反向代理到 Spring Boot
        location /api/ {
            proxy_pass http://127.0.0.1:8080;  # Spring Boot 端口
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_read_timeout 60s;

            # CORS 头
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # Vue Router History 模式支持
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # ============================================
    # HTTPS 门户配置（配置SSL证书后使用）
    # ============================================
    # server {
    #     listen 443 ssl http2;
    #     server_name portal.example.com;
    #
    #     ssl_certificate /etc/nginx/ssl/portal.crt;
    #     ssl_certificate_key /etc/nginx/ssl/portal.key;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    #
    #     root /var/www/portal/dist;
    #     index index.html;
    #
    #     location /api/ {
    #         proxy_pass http://127.0.0.1:8080;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto https;
    #     }
    #
    #     location / {
    #         try_files $uri $uri/ /index.html;
    #     }
    # }

    # ============================================
    # 子系统：任务管理系统
    # 独立部署在 9001 端口（Spring Boot 应用）
    # ============================================
    server {
        listen 80;
        server_name task.example.com;

        location / {
            proxy_pass http://127.0.0.1:9001;  # 任务管理系统端口
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ============================================
    # 子系统：数据可视化平台
    # 独立部署在 9002 端口
    # ============================================
    server {
        listen 80;
        server_name chart.example.com;

        location / {
            proxy_pass http://127.0.0.1:9002;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ============================================
    # 子系统：接口管理平台（静态部署示例）
    # 直接指向 Vue 构建目录
    # ============================================
    server {
        listen 80;
        server_name api-manager.example.com;

        root /var/www/api-manager/dist;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # 该子系统的后端API（端口9003）
        location /api/ {
            proxy_pass http://127.0.0.1:9003;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # ============================================
    # 子系统端口配置参考（按需添加更多子系统）
    # 9001 - 任务管理系统
    # 9002 - 数据可视化平台
    # 9003 - 接口管理平台
    # 9004 - 在线音乐播放器
    # 9005 - 个人记账本
    # 9006 - 简历生成器
    # ============================================
}
