version: '3.8'

services:
  # 门户后端
  portal-backend:
    build:
      context: ./portal-backend
      dockerfile: Dockerfile
    container_name: portal-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/portal_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=portal
      - SPRING_DATASOURCE_PASSWORD=portal_pass_2024
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - portal-net

  # MySQL 数据库（生产环境）
  mysql:
    image: mysql:8.0
    container_name: portal-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_pass_2024
      MYSQL_DATABASE: portal_db
      MYSQL_USER: portal
      MYSQL_PASSWORD: portal_pass_2024
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - portal-net

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: portal-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./portal-frontend/dist:/var/www/portal/dist:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - portal-backend
    restart: unless-stopped
    networks:
      - portal-net

volumes:
  mysql_data:

networks:
  portal-net:
    driver: bridge
